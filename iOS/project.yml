name: BrewLog
options:
  bundleIdPrefix: com.shimondeitel.brewlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BrewLog:
    type: application
    platform: iOS
    sources:
      - path: BrewLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.brewlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BrewLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BrewLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BrewLogTests
      - path: BrewLog.storekit
    dependencies:
      - target: BrewLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.brewlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BrewLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BrewLogUITests
    dependencies:
      - target: BrewLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.brewlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BrewLog:
    build:
      targets:
        BrewLog: all
        BrewLogTests: [test]
        BrewLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BrewLog.storekit
    test:
      config: Debug
      storeKitConfiguration: BrewLog.storekit
      targets:
        - BrewLogTests
        - BrewLogUITests
    archive:
      config: Release
